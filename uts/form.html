<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulir Pendaftaran - PPDB SMA Taruna Bakti</title>
    <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>
    <header>
        <h1>Penerimaan Peserta Didik Baru (PPDB) 🏫</h1>
        <p>SMA Taruna Bakti - Tahun Ajaran 2026/2027</p>
    </header>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="alur.html">Alur Pendaftaran</a>
        <a href="form.html" class="active">Isi Formulir</a>
    </nav>

    <main>
        <h2>Formulir Biodata Calon Siswa</h2>
        <p>Mohon isi data berikut dengan benar sesuai dengan dokumen asli.</p>
        <form id="ppdbForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap Sesuai Ijazah/Akta:</label>
                <input type="text" id="nama" name="nama" placeholder="Cth: Budi Santoso" required>
            </div>

            <div class="form-group">
                <label for="nik">Nomor Induk Kependudukan (NIK - 16 Digit):</label>
                <input type="number" id="nik" name="nik" placeholder="16 Digit NIK" required>
            </div>

            <div class="form-group">
                <label for="jalur">Jalur Pendaftaran:</label>
                <select id="jalur" required>
                    <option value="">-- Pilih Jalur --</option>
                    <option value="Zonasi">Zonasi (Berdasarkan Jarak Domisili)</option>
                    <option value="Prestasi">Prestasi (Akademik & Non-Akademik)</option>
                </select>
            </div>

            <button type="button" onclick="validasiForm()">Kirim Pendaftaran</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 SMA Taruna Bakti. Terakreditasi A.</p>
    </footer>

    <script src="asset/javascript/script.js"></script>
</body>
</html>
